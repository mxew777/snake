name: Build Android APK

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            build-essential \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            automake \
            libtool \
            pkg-config \
            ccache \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libltdl-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev

      - name: Increase swap memory
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Install Python packages
        run: |
          python3 -m pip install --upgrade pip
          pip3 install cython==0.29.33
          pip3 install buildozer==1.5.0

      - name: Clean previous builds
        run: |
          buildozer android clean

      - name: Build APK
        run: |
          buildozer android debug > build.log 2>&1 || true
          tail -200 build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SnakeGame-APK
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
